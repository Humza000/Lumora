kind = "web"
previewPath = "/"
title = "Lumora Agency Website"
version = "1.0.0"
id = "artifacts/lumora"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21587

[services.development]
run = "pnpm --filter @workspace/lumora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lumora", "run", "build" ]
publicDir = "artifacts/lumora/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/"
to = "/index.html"

[[services.production.rewrites]]
from = "/portfolio"
to = "/portfolio/index.html"

[[services.production.rewrites]]
from = "/portfolio/peak-performance-gym"
to = "/portfolio/peak-performance-gym/index.html"

[[services.production.rewrites]]
from = "/portfolio/maison-co"
to = "/portfolio/maison-co/index.html"

[[services.production.rewrites]]
from = "/portfolio/sterling-legal-group"
to = "/portfolio/sterling-legal-group/index.html"

[[services.production.rewrites]]
from = "/portfolio/the-workshop-cafe"
to = "/portfolio/the-workshop-cafe/index.html"

[[services.production.rewrites]]
from = "/portfolio/brightsmile-dental"
to = "/portfolio/brightsmile-dental/index.html"

[[services.production.rewrites]]
from = "/portfolio/tradecraft-plumbing"
to = "/portfolio/tradecraft-plumbing/index.html"

[[services.production.rewrites]]
from = "/admin"
to = "/index.html"

[services.env]
PORT = "21587"
BASE_PATH = "/"
